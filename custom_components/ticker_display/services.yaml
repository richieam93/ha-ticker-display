      example: "all"

show_graph:
  name: Show graph
  description: Show a graph screen on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"

show_camera:
  name: Show camera
  description: Show a camera screen on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    entity_id:
      name: Camera entity
      description: Camera entity to display.
      example: "camera.front_door"

show_weather:
  name: Show weather
  description: Show a weather screen on one or more devices.
  fields:
