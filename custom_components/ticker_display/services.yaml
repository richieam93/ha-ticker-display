show_dashboard:
  name: Show dashboard
  description: Zeigt den Dashboard-/Webseiten-Screen auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, kommagetrennte Liste, YAML-Liste oder "all".
      example: redmi_note_7_redmi_note_7
    dashboard:
      name: Dashboard path
      description: Optionaler Dashboard-Pfad oder HA-URL.
      example: /lovelace/default_view

show_graph:
  name: Show graph
  description: Zeigt einen Graph-/Chart-Screen auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    graph_id:
      name: Graph ID
      description: Optionale gespeicherte Graph-Konfiguration.
      example: energy_today
    entity_id:
      name: Primary entity
      description: Optionale Haupt-Entity für den Graphen.
      example: sensor.stromverbrauch_heute

show_camera:
  name: Show camera
  description: Zeigt einen Kamera-Screen auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    entity_id:
      name: Camera entity
      description: Kamera-Entity, die angezeigt werden soll.
      example: camera.front_door
    title:
      name: Title
      description: Optionaler Titel auf dem Screen.
      example: Haustür

show_weather:
  name: Show weather
  description: Zeigt einen Wetter-Screen auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    entity_id:
      name: Weather entity
      description: Wetter-Entity für die Anzeige.
      example: weather.home

show_single_value:
  name: Show single value
  description: Zeigt einen Einzelwert-Screen auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    entity_id:
      name: Entity
      description: Sensor oder Entity, die groß dargestellt werden soll.
      example: sensor.wohnzimmer_temperatur
    label:
      name: Label
      description: Optionales eigenes Label.
      example: Wohnzimmer

show_clock:
  name: Show clock
  description: Zeigt den Uhr-Screen auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

show_status_board:
  name: Show status board
  description: Zeigt ein Status-Board auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    board_id:
      name: Board ID
      description: Optionale ID eines gespeicherten Boards.
      example: daily_status

show_image:
  name: Show image
  description: Zeigt einen Bild-Screen auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    image_url:
      name: Image URL
      description: Bild-URL oder lokaler HA-Pfad.
      example: /media/local/family.jpg
    title:
      name: Title
      description: Optionaler Titel.
      example: Familienfoto

show_template:
  name: Show template
  description: Zeigt eine gespeicherte Screen-Vorlage auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    template_id:
      name: Template ID
      description: Gespeicherte Template-ID aus dem Editor.
      example: template_wohnzimmer

show_alert:
  name: Show alert
  description: Zeigt einen Alert auf einem oder mehreren Geräten an. Unterstützt Banner, Overlay, Vollbild, Fortschritt, Buttons, Sound und TTS.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    title:
      name: Title
      description: Alert-Titel.
      example: Türklingel
    message:
      name: Message
      description: Alert-Text.
      example: Jemand steht vor der Haustür
    severity:
      name: Severity
      description: info, warning, critical oder success.
      example: warning
    mode:
      name: Mode
      description: fullscreen, banner, overlay, toast, pip, split oder notification.
      example: fullscreen
    color:
      name: Color
      description: Banner-/Akzentfarbe als Hex-Wert.
      example: "#ff9800"
    duration:
      name: Duration
      description: Dauer in Sekunden. 0 = manuell schließen.
      example: 10
    wake_screen:
      name: Wake screen
      description: Display bei Eingang des Alerts einschalten.
      example: true
    sound:
      name: Sound
      description: Interner Sound oder Alias, z. B. alarm, notification oder doorbell.
      example: doorbell
    volume:
      name: Volume
      description: Lautstärke in Prozent.
      example: 90
    tag:
      name: Tag
      description: Freies Kennzeichen für Ersetzen/Schließen desselben Alerts.
      example: frontdoor
    source:
      name: Source
      description: Quelle oder Bereich.
      example: Haustür
    progress_value:
      name: Progress value
      description: Fortschritt in Prozent von 0 bis 100.
      example: 65
    progress_text:
      name: Progress text
      description: Text unter der Fortschrittsanzeige.
      example: 2 von 3 erledigt
    require_ack:
      name: Require acknowledge
      description: Muss vom Nutzer bestätigt werden.
      example: true
    ack_label:
      name: Ack label
      description: Text des Bestätigen-Buttons.
      example: Bestätigen
    secondary_label:
      name: Secondary label
      description: Text des zweiten Buttons.
      example: Schließen
    actions:
      name: Actions
      description: Zusätzliche Buttons als Liste, z. B. [{"id":"open_cam","label":"Kamera"}].
      example: '[{"id":"open_cam","label":"Kamera"}]'
    template_id:
      name: Template ID
      description: Optionale gespeicherte Alert-Vorlage als Basis.
      example: doorbell
    tts_message:
      name: TTS message
      description: Optionaler TTS-Text für denselben Alert.
      example: Achtung. Jemand steht vor der Haustür.
    tts_language:
      name: TTS language
      description: Sprachcode für Android/HA-TTS.
      example: de-DE
    tts_engine_id:
      name: TTS engine
      description: Optionale HA-TTS-Engine.
      example: google_translate

show_alert_template:
  name: Show alert template
  description: Zeigt eine gespeicherte Alert-Vorlage an und erlaubt Überschreibungen.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    template_id:
      name: Template ID
      description: Gespeicherte Alert-Vorlage.
      example: doorbell
    title:
      name: Title override
      description: Optionaler Titel-Override.
      example: Haustür
    message:
      name: Message override
      description: Optionaler Nachrichten-Override.
      example: Paketbote erkannt
    severity:
      name: Severity
      description: info, warning, critical oder success.
      example: warning
    mode:
      name: Mode
      description: fullscreen, banner, overlay, toast, pip, split oder notification.
      example: overlay

show_alert_sequence:
  name: Show alert sequence
  description: Zeigt mehrere Alerts nacheinander auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    alerts:
      name: Alerts
      description: Liste kompletter Alert-Payloads.
      example: '[{"title":"Tür","message":"Jemand da","duration":5},{"title":"Garage","message":"Tor offen","mode":"banner"}]'

show_notification:
  name: Show notification
  description: Zeigt einen Notification-/Banner-Alert auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    title:
      name: Title
      description: Benachrichtigungstitel.
      example: Info
    message:
      name: Message
      description: Benachrichtigungstext.
      example: Waschmaschine fertig
    color:
      name: Color
      description: Optionale Bannerfarbe.
      example: "#2196f3"

show_toast:
  name: Show toast
  description: Zeigt einen kleinen Toast-Hinweis auf einem oder mehreren Geräten an.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    title:
      name: Title
      description: Optionaler kurzer Titel.
      example: Info
    message:
      name: Message
      description: Toast-Text.
      example: Willkommen zuhause
    duration:
      name: Duration
      description: Anzeigedauer in Sekunden.
      example: 6
    color:
      name: Color
      description: Hintergrundfarbe.
      example: "#111827"
    text_color:
      name: Text color
      description: Textfarbe.
      example: "#f9fafb"
    accent_color:
      name: Accent color
      description: Akzentfarbe links/oben.
      example: "#60a5fa"
    border_radius:
      name: Border radius
      description: Radius in Pixel.
      example: 16
    font_size:
      name: Font size
      description: Schriftgröße in Pixel.
      example: 16
    position:
      name: Position
      description: bottom, top, center.
      example: bottom
    wake_screen:
      name: Wake screen
      description: Display für den Toast aufwecken.
      example: true

clear_alert:
  name: Clear alert
  description: Schließt aktive Alerts auf einem oder mehreren Geräten.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    tag:
      name: Tag
      description: Optional nur einen Alert mit passendem Tag schließen.
      example: frontdoor

send_ticker_message:
  name: Send ticker message
  description: Sendet eine oder mehrere Meldungen an die Ticker-Leiste.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    message:
      name: Message
      description: Einzelne Ticker-Meldung.
      example: Willkommen zuhause 👋
    messages:
      name: Messages
      description: Liste mehrerer Ticker-Meldungen.
      example: '[{"text":"🌡️ Wohnzimmer 22°C"},{"text":"⚡ Strompreis 26 ct/kWh"}]'
    color:
      name: Color
      description: Optionale Farbe für die Einzelmeldung.
      example: "#f3f4f6"
    icon:
      name: Icon
      description: Optionales Emoji/Icon vor der Meldung.
      example: "📢"
    replace:
      name: Replace
      description: Vorherige Live-Meldungen auf dem Gerät ersetzen.
      example: true
    duration:
      name: Duration
      description: Sichtbarkeit der Live-Meldung in Sekunden.
      example: 15

set_ticker_entities:
  name: Set ticker entities
  description: Konfiguriert Entity-basierte Ticker-Meldungen auf dem Gerät.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    entities:
      name: Entities
      description: Liste von Entity-Konfigurationen mit Template.
      example: '[{"entity_id":"sensor.temp","template":"🌡️ {friendly_name}: {state}{unit}"}]'

clear_ticker:
  name: Clear ticker
  description: Löscht die aktuelle Ticker-Leiste auf einem oder mehreren Geräten.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

set_screen_power:
  name: Set screen power
  description: Schaltet den Bildschirm ein oder aus.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    power:
      name: Power
      description: true = an, false = aus.
      example: true

set_brightness:
  name: Set brightness
  description: Setzt die Display-Helligkeit in Prozent.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    brightness:
      name: Brightness
      description: Helligkeit von 0 bis 100.
      example: 80

set_theme:
  name: Set theme
  description: Sendet ein Theme-Update an das Gerät.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    mode:
      name: Mode
      description: Theme-Modus, z. B. light oder dark.
      example: dark
    accent:
      name: Accent
      description: Akzentfarbe.
      example: "#4f46e5"

set_volume:
  name: Set volume
  description: Setzt die Lautstärke auf dem Gerät.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    volume:
      name: Volume
      description: Lautstärke in Prozent.
      example: 50

play_sound:
  name: Play sound
  description: Spielt einen internen Sound oder eine Sound-URL ab.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    sound:
      name: Sound
      description: Interner Sound/Alias wie doorbell, notification, alarm.
      example: doorbell
    sound_url:
      name: Sound URL
      description: Alternative direkte Audio-URL.
      example: /media/local/chime.mp3
    volume:
      name: Volume
      description: Lautstärke in Prozent.
      example: 100
    loop:
      name: Loop
      description: Sound wiederholen.
      example: false

play_announcement:
  name: Play announcement
  description: Spielt eine kurze Ansage ab und nutzt wenn möglich den HA-Medienbrowser-/Assist-Pfad.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    url:
      name: URL
      description: Audio-URL für die Ansage.
      example: /media/local/doorbell.mp3
    sound_url:
      name: Sound URL
      description: Alternative lokale Sound-URL.
      example: /ticker-display/media/sounds/alert.wav
    sound:
      name: Sound
      description: Optionaler interner Sound.
      example: ding
    volume:
      name: Volume
      description: Lautstärke in Prozent.
      example: 90
    title:
      name: Title
      description: Optionale Bezeichnung der Ansage.
      example: Türgong

tts_speak:
  name: TTS speak
  description: Spricht einen Text auf einem oder mehreren Geräten.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    message:
      name: Message
      description: Zu sprechender Text.
      example: Achtung, die Haustür wurde geöffnet.
    language:
      name: Language
      description: Sprachcode für TTS.
      example: de-DE
    tts_engine_id:
      name: TTS engine
      description: Optionale HA-TTS-Engine für die URL-basierte Ausgabe.
      example: google_translate
    tts_entity_id:
      name: TTS entity
      description: Optionale TTS-Entity für den direkten HA tts.speak Weg.
      example: tts.piper_2
    media_player_entity_id:
      name: Media player entity
      description: Optionaler Ziel-Media-Player. Wird sonst automatisch aus dem Gerät ermittelt.
      example: media_player.redmi_note_7_redmi_note_7_speaker
    volume:
      name: Volume
      description: Lautstärke in Prozent.
      example: 70

stop_audio:
  name: Stop audio
  description: Stoppt laufende Audio-Wiedergabe.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

next_screen:
  name: Next screen
  description: Wechselt zum nächsten Screen.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

previous_screen:
  name: Previous screen
  description: Wechselt zum vorherigen Screen.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

goto_screen:
  name: Go to screen
  description: Springt zu einem bestimmten Screen anhand von ID oder Name.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7
    screen_id:
      name: Screen ID
      description: Screen-ID oder Name, z. B. screen_1, screen_2 oder Screen 3.
      example: screen_3

pause_rotation:
  name: Pause rotation
  description: Pausiert die automatische Screen-Rotation.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

resume_rotation:
  name: Resume rotation
  description: Setzt die automatische Screen-Rotation fort.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

reload_page:
  name: Reload page
  description: Lädt die Display-Seite neu.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

identify_device:
  name: Identify device
  description: Zeigt eine kurze Markierung/Overlay auf dem Gerät, um es eindeutig zu identifizieren.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: redmi_note_7_redmi_note_7

