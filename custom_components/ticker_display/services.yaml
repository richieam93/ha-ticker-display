      example: 15

set_screen_orientation:
  name: Set orientation
  description: Bildschirmausrichtung.
  fields:
    device:
      name: Device
      description: Geräte-ID oder "all".
      example: redmi_note_7
    orientation:
      name: Orientation
      description: 0, 90, 180, 270.
      example: 0

play_media:
