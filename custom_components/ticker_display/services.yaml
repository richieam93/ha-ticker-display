  description: Mediendatei abspielen.
  fields:
    device:
      name: Device
      description: Geräte-ID oder "all".
      example: redmi_note_7
    media_url:
      name: Media URL
      description: URL der Datei.
      example: /media/local/song.mp3
    volume:
      name: Volume
      description: 0-100.
      example: 70
    loop:
      name: Loop
      description: true/false.
      example: false

stop_media:
  name: Stop media
  description: Stoppt Wiedergabe.
  fields:
    device:
      name: Device
      description: Geräte-ID oder "all".
      example: redmi_note_7

media_next:
  name: Media next
  description: Nächster Track.
  fields:
    device:
      name: Device
      description: Geräte-ID oder "all".
      example: redmi_note_7

media_previous:
  name: Media previous
  description: Vorheriger Track.
  fields:
    device:
      name: Device
      description: Geräte-ID oder "all".
      example: redmi_note_7

media_pause:
  name: Media pause
  description: Pause.
  fields:
    device:
      name: Device
      description: Geräte-ID oder "all".
      example: redmi_note_7

media_resume:
  name: Media resume
  description: Fortsetzen.
  fields:
    device:
      name: Device
      description: Geräte-ID oder "all".
      example: redmi_note_7
