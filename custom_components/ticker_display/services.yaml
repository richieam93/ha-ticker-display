    entity_id:
      name: Weather entity
      description: Weather entity to display.
      example: "weather.home"

show_single_value:
  name: Show single value
  description: Show a single-value screen on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    entity_id:
      name: Entity
      description: Entity to display.
      example: "sensor.temperature"

show_clock:
  name: Show clock
  description: Show a clock screen on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"

show_status_board:
  name: Show status board
  description: Show a status board screen on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"

show_image:
  name: Show image
  description: Show an image screen on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    image_url:
      name: Image URL
      description: Image URL to display.
      example: "/ticker-display/media/images/example.png"

show_template:
  name: Show template
  description: Show a saved template on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    template_id:
      name: Template ID
      description: Saved template ID.
      example: "template_123"

show_alert:
  name: Show alert
  description: Show an alert on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    title:
      name: Title
      description: Alert title.
      example: "Alarm"
    message:
      name: Message
      description: Alert message.
      example: "Bewegung erkannt"
    severity:
      name: Severity
      description: Alert severity.
      example: "warning"
    mode:
      name: Mode
      description: Alert mode.
      example: "fullscreen"
    sound:
      name: Sound
      description: Sound-ID oder Alias, z. B. alarm, alarm_critical, notification oder doorbell.
      example: "alarm_critical"
    template_id:
      name: Template ID
      description: Optional gespeicherte Alert-Vorlage als Basis.
      example: "doorbell"
    tag:
      name: Tag
      description: Freies Kennzeichen für Automationen und gezieltes Schließen.
      example: "frontdoor"
    source:
      name: Source
      description: Quelle / Bereich des Alerts.
      example: "Haustür"
    progress_value:
      name: Progress
      description: Optionaler Prozentwert 0-100.
      example: 65
    progress_text:
      name: Progress text
      description: Text unter dem Fortschritt.
      example: "2 von 3 geprüft"
    require_ack:
      name: Require acknowledge
      description: Alert erst nach Bestätigung schließen.
      example: true
    ack_label:
      name: Ack label
      description: Text für Bestätigen-Button.
      example: "Bestätigen"
    secondary_label:
      name: Secondary label
      description: Zweiter Aktionsbutton.
      example: "Später"
    actions:
      name: Actions
      description: Liste zusätzlicher Buttons, z. B. [{"id":"open_cam","label":"Kamera"}].
      example: '[{"id":"open_cam","label":"Kamera"}]'
    tts_message:
      name: TTS message
      description: Optionaler Text, den die Android-App direkt vorliest.
      example: "Achtung. Bewegung an der Haustür."
    tts_language:
      name: TTS language
      description: Sprachcode fuer die Android-App, z. B. de-DE, de-CH oder en-US.
      example: "de-DE"
    duration:
      name: Duration
      description: Sekunden bis der Alert automatisch verschwindet und der vorherige Screen wieder sichtbar wird.
      example: 10
    dismiss_after:
      name: Dismiss after
      description: Alias zu Duration in Sekunden.
      example: 10

show_alert_template:
  name: Show alert template
  description: Show a saved alert template on one or more devices, with optional overrides.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    template_id:
      name: Template ID
      description: Saved alert template ID.
      example: "doorbell"
    title:
      name: Title override
      description: Optional title override.
      example: "Haustür"
    message:
      name: Message override
      description: Optional message override.
      example: "Jemand steht vor der Tür"
    severity:
      name: Severity
      description: info, warning, critical
      example: "warning"
    mode:
      name: Mode
      description: fullscreen, banner, overlay, toast, pip, split, notification
      example: "overlay"

show_alert_sequence:
  name: Show alert sequence
  description: Show multiple alerts in sequence on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    alerts:
      name: Alerts
      description: List of alert payloads.
      example: '[{"title":"Tür","message":"Jemand da","duration":5},{"title":"Kamera","message":"Garage","mode":"overlay"}]'

show_notification:
  name: Show notification
  description: Show a notification banner on one or more devices.
  fields:
    device:
      name: Device
      description: Device ID, a list of device IDs, or "all".
      example: "all"
    title:
      name: Title
      description: Notification title.
      example: "Info"
    message:
      name: Message
      description: Notification text.
      example: "Waschmaschine fertig"

show_toast:
